services:
  - type: web
    name: precaorama-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false   # preencha manualmente no painel do Render
    autoDeploy: true
